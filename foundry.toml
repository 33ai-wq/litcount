[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
litvm_testnet = "https://rpc.litvm-testnet.io"  # Update with actual RPC

[etherscan]
litvm_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.litvm-testnet.io/api" }
