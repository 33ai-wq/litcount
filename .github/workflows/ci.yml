name: LitCount CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Tests ─────────────────────────────────────────
  contracts:
    name: Foundry Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Check contract sizes
        run: forge build --sizes

  # ── Frontend Build ───────────────────────────────────────────────
  frontend:
    name: Next.js Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_LITVM_RPC: ${{ secrets.NEXT_PUBLIC_LITVM_RPC }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.WALLETCONNECT_PROJECT_ID }}

  # ── Deploy Contracts (mainnet only on push to main) ──────────────
  deploy-contracts:
    name: Deploy to LitVM Testnet
    needs: [contracts]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Deploy
        run: |
          forge script script/Deploy.s.sol:DeployLitCount \
            --rpc-url ${{ secrets.LITVM_RPC_URL }} \
            --broadcast \
            --verify \
            -vvvv
        env:
          PRIVATE_KEY:          ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          LITVM_RPC_URL:        ${{ secrets.LITVM_RPC_URL }}
          LITVM_EXPLORER_URL:   ${{ secrets.LITVM_EXPLORER_URL }}
          ETHERSCAN_API_KEY:    ${{ secrets.LITVM_ETHERSCAN_KEY }}
